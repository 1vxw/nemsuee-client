<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001d44;stop-opacity:0.15" />
      <stop offset="50%" style="stop-color:#775a19;stop-opacity:0.12" />
      <stop offset="100%" style="stop-color:#001d44;stop-opacity:0.2" />
    </linearGradient>
    <linearGradient id="book" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d7e2ff" />
      <stop offset="100%" style="stop-color:#abc7ff" />
    </linearGradient>
  </defs>
  <rect width="400" height="240" fill="url(#bg)"/>
  <g transform="translate(160, 60)">
    <!-- Book spine -->
    <path d="M40 20 L40 160 Q40 180 60 180 L60 0 Q40 0 40 20" fill="url(#book)" stroke="#001d44" stroke-width="2" stroke-opacity="0.3"/>
    <!-- Book pages -->
    <rect x="60" y="0" width="120" height="180" rx="2" fill="#f4f3f8" stroke="#001d44" stroke-width="2" stroke-opacity="0.2"/>
    <!-- Book lines -->
    <line x1="75" y1="40" x2="165" y2="40" stroke="#001d44" stroke-width="1" stroke-opacity="0.15"/>
    <line x1="75" y1="60" x2="155" y2="60" stroke="#001d44" stroke-width="1" stroke-opacity="0.15"/>
    <line x1="75" y1="80" x2="165" y2="80" stroke="#001d44" stroke-width="1" stroke-opacity="0.15"/>
    <line x1="75" y1="100" x2="145" y2="100" stroke="#001d44" stroke-width="1" stroke-opacity="0.15"/>
  </g>
  <!-- Decorative elements -->
  <circle cx="320" cy="180" r="40" fill="#775a19" fill-opacity="0.08"/>
  <circle cx="80" cy="200" r="30" fill="#001d44" fill-opacity="0.06"/>
</svg>
